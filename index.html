<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[APP NAME] — wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --accent:#4A7C59;
    --ink:#2b2b2b;
    --mut:#7a7a7a;
    --line:#bdbdbd;
    --line2:#d8d8d8;
    --bg:#efefef;
    --card:#fafafa;
    --box:#e4e4e4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#c9c9c9;
    font-family:'Urbanist',-apple-system,sans-serif;
    color:var(--ink)}
  /* form controls don't inherit type by default — route them to Urbanist too */
  input,button,textarea,select{font-family:inherit}
  #root{display:flex;justify-content:center;padding:24px 12px 40px}

  /* phone frame — simplified iPhone mockup: dark body + bezel, dynamic island,
     status bar. This is prototype-shell chrome, NOT wireframe app UI. */
  .phone{width:412px;max-width:100%;height:844px;background:#0c0c0c;
    border-radius:56px;padding:13px;position:relative;display:flex;flex:0 0 auto}
  .device{flex:1;background:var(--bg);border-radius:44px;overflow:hidden;
    position:relative;display:flex;flex-direction:column}
  /* dynamic island */
  .island{position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:112px;height:31px;background:#000;border-radius:16px;z-index:60}
  /* status bar — constant device chrome, solid ink (never dashed/wireframe) */
  .statusbar{flex:0 0 auto;height:48px;display:flex;align-items:center;
    justify-content:space-between;padding:0 26px;color:var(--ink)}
  .sb-time{font-size:14px;font-weight:600;letter-spacing:.02em}
  .sb-right{display:flex;align-items:center;gap:6px}
  .sb-right svg{display:block}
  .screen{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:8px 16px 24px;
    display:flex;flex-direction:column;gap:14px}
  .screen::-webkit-scrollbar{width:0}

  /* header */
  .topbar{display:flex;align-items:center;gap:10px;min-height:32px}
  .topbar h1{font-size:18px;margin:0;font-weight:700;flex:1}
  .back{border:1px solid var(--line);background:#fff;border-radius:8px;
    padding:6px 10px;font-size:14px;cursor:pointer;color:var(--ink)}
  .back:active{background:#eee}
  .kicker{font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--mut);font-weight:700}

  /* [APP NAME] placeholder chip — name is undecided */
  .brand{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;
    color:var(--mut);background:var(--box);border:1px dashed var(--line);
    border-radius:6px;padding:2px 7px}

  /* generic */
  .muted{color:var(--mut)}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .col{display:flex;flex-direction:column;gap:10px}
  .spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .grow{flex:1}
  h2{font-size:16px;margin:0 0 2px}
  p{margin:0;line-height:1.45;font-size:14px}
  small{font-size:12px}

  .card{background:var(--card);border:1px solid var(--line2);border-radius:14px;
    padding:14px}
  .card.tap{cursor:pointer}
  .card.tap:active{background:#f0f0f0}

  /* placeholder boxes (photos / charts) */
  .ph{background:repeating-linear-gradient(45deg,#e4e4e4,#e4e4e4 8px,#dcdcdc 8px,#dcdcdc 16px);
    border:1px dashed var(--line);border-radius:10px;display:flex;
    align-items:center;justify-content:center;color:var(--mut);font-size:12px;
    letter-spacing:.08em;font-weight:700;min-height:64px}
  .ph.round{border-radius:50%}

  /* photo avatar badge (emotion glyph sits on the photo, never replaces it) */
  .badge{position:absolute;top:4px;right:4px;min-width:26px;height:26px;padding:0 4px;
    border-radius:999px;border:2px solid var(--line);background:#fff;display:flex;
    align-items:center;justify-content:center;
    font-size:11px;color:var(--ink)}

  /* buttons */
  .btn{display:block;width:100%;text-align:center;border-radius:12px;padding:14px;
    font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--mut)}
  .btn.sm{padding:9px 12px;width:auto;font-size:13px}
  .btn[disabled]{opacity:.5;pointer-events:none}

  /* face (expressive moments only — reactions, alerts) */
  .face{width:var(--fs,56px);height:var(--fs,56px);border-radius:50%;
    border:2px solid var(--line);background:#fff;display:flex;align-items:center;
    justify-content:center;font-size:var(--ff,18px);
    flex:0 0 auto;color:var(--ink)}
  .face.big{--fs:120px;--ff:40px;border-width:3px}
  .face.accent{border-color:var(--accent)}

  /* header icon buttons + user avatar */
  .iconbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:#fff;display:flex;align-items:center;justify-content:center;
    font-size:17px;cursor:pointer;flex:0 0 auto;position:relative}
  .iconbtn:active{background:#eee}
  .avatarbtn{width:38px;height:38px;border-radius:50%;border:1px dashed var(--line);
    background:repeating-linear-gradient(45deg,#e4e4e4,#e4e4e4 6px,#dcdcdc 6px,#dcdcdc 12px);
    cursor:pointer;flex:0 0 auto}
  .ndot{position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;
    background:var(--accent);border:1px solid #fff}

  /* status dot / pill */
  .dot{width:9px;height:9px;border-radius:50%;background:var(--line);flex:0 0 auto}
  .dot.ok{background:var(--accent)}
  .dot.warn{background:#555}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
    border-radius:999px;padding:4px 10px;font-size:12px;background:#fff}
  .pill.accent{border-color:var(--accent);color:var(--accent);font-weight:600}

  /* list */
  .list{display:flex;flex-direction:column;gap:0}
  .li{display:flex;gap:12px;align-items:center;padding:12px 4px;
    border-bottom:1px solid var(--line2)}
  .li:last-child{border-bottom:none}

  /* task check */
  .check{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;font-size:14px;color:#fff}
  .check.done{background:var(--accent);border-color:var(--accent)}
  .taskrow{transition:opacity .25s ease}
  .taskrow.isdone{opacity:.55}
  .done-txt{text-decoration:line-through;color:var(--mut)}

  /* plant pager (swipeable pages of a 2x2 grid)
     NOTE: page width is pinned to the phone content width (358px = 390 - 2*16)
     and both pager & page carry an explicit height. A grid nested as a flex
     child under scroll-snap otherwise collapses to zero height in Safari,
     which is why the cards were rendering blank. */
  .pager{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
    margin:0 -16px;padding:4px 16px;gap:12px;min-height:372px;
    -webkit-overflow-scrolling:touch}
  .pager::-webkit-scrollbar{height:0;display:none}
  .page{flex:0 0 358px;width:358px;max-width:calc(100vw - 40px);
    scroll-snap-align:center;display:flex;flex-direction:column;gap:10px;
    min-height:360px}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:150px;gap:10px;
    align-content:start}
  .plantcard{border:1px solid var(--line2);border-radius:14px;padding:8px;
    background:#fff;cursor:pointer;display:flex;flex-direction:column;gap:6px;
    min-height:150px;overflow:hidden}
  .plantcard:active{background:#f2f2f2}
  .plantcard .photo{position:relative;height:92px}
  .plantcard b{font-size:14px}
  /* compact, secondary "+ add plant" tile — sits above the grid, not a peer of plant cards */
  .addtile{border:1px dashed var(--line);border-radius:12px;background:#fff;color:var(--accent);
    display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;
    font-size:13px;font-weight:700;cursor:pointer;flex:0 0 auto}
  .addtile:active{background:#f2f2f2}
  .addtile .plus{font-size:18px;line-height:1;font-weight:400}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:2px}
  .pgdot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .pgdot.on{background:var(--accent)}

  /* progress */
  .bar{height:12px;background:var(--box);border-radius:999px;overflow:hidden;
    border:1px solid var(--line2)}
  .bar > i{display:block;height:100%;background:var(--accent);width:0}
  .bar > i.fill-anim{animation:fill 2.2s linear forwards}
  @keyframes fill{from{width:6%}to{width:100%}}

  /* spinner */
  .spin{width:30px;height:30px;border:3px solid var(--line2);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;flex:0 0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* radar-ish searching pulse */
  .pulse{width:14px;height:14px;border-radius:50%;background:var(--accent);
    animation:pulse 1.1s infinite ease-out;flex:0 0 auto}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,124,89,.4)}100%{box-shadow:0 0 0 12px rgba(74,124,89,0)}}

  /* chat */
  .bubble{max-width:78%;padding:10px 12px;border-radius:14px;font-size:14px;
    border:1px solid var(--line2);background:#fff;line-height:1.4}
  .bubble.me{background:var(--accent);color:#fff;border-color:var(--accent);
    align-self:flex-end;border-bottom-right-radius:4px}
  .bubble.them{align-self:flex-start;border-bottom-left-radius:4px}
  .msg{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
  .msg.me{align-items:flex-end}
  .who{font-size:11px;color:var(--mut);padding:0 4px}
  .composer{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line2);
    padding-top:10px;margin-top:auto}
  .composer input{flex:1;border:1px solid var(--line);border-radius:999px;
    padding:11px 14px;font-size:14px;background:#fff}

  /* mini chat preview widget (dashboard) — miniature of the real chat */
  .miniwrap{display:flex;flex-direction:column;gap:8px}
  .minirow{display:flex;gap:6px;align-items:flex-end}
  .minirow.me{flex-direction:row-reverse}
  .miniava{width:24px;height:24px;min-height:0;flex:0 0 auto}
  .minibub{max-width:72%;font-size:12px;line-height:1.35;padding:6px 9px;
    border-radius:12px;border:1px solid var(--line2);background:#fff;color:var(--ink)}
  .minirow.them .minibub{border-bottom-left-radius:3px}
  .minirow.me .minibub{background:var(--accent);color:#fff;border-color:var(--accent);
    border-bottom-right-radius:3px}
  .mininame{font-size:9px;color:var(--mut);margin:0 0 1px 2px}

  /* auto-watering / reservoir controls (plant detail) */
  .segrow{display:flex;gap:6px}
  .seg{flex:1;text-align:center;border:1px solid var(--line);background:#fff;
    border-radius:9px;padding:8px 6px;font-size:12px;cursor:pointer;color:var(--ink)}
  .seg.on{border-color:var(--accent);color:var(--accent);font-weight:700;
    box-shadow:inset 0 0 0 1px var(--accent)}
  .resbar{height:14px;background:var(--box);border-radius:999px;overflow:hidden;
    border:1px solid var(--line2)}
  .resbar > i{display:block;height:100%;background:var(--accent)}
  .resbar.low > i{background:#666}

  /* bond hearts */
  .hearts{font-size:14px;letter-spacing:2px}
  .hearts .on{color:var(--accent)}
  .hearts .off{color:var(--line)}

  /* choice chips / options / toggle */
  .chip{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;
    cursor:pointer;font-size:14px;flex:1;text-align:center}
  .chip.on{border-color:var(--accent);color:var(--accent);font-weight:700;
    box-shadow:inset 0 0 0 1px var(--accent)}
  .opt{border:1px solid var(--line);border-radius:12px;padding:11px 12px;cursor:pointer;
    background:#fff}
  .opt.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .opt b{font-size:14px}
  .opt small{display:block;color:var(--mut);margin-top:2px}
  .field label{font-size:12px;color:var(--mut);display:block;margin-bottom:5px;
    text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;
    font-size:15px;background:#fff}
  .toggle{width:44px;height:26px;border-radius:999px;background:var(--box);
    border:1px solid var(--line);position:relative;cursor:pointer;flex:0 0 auto}
  .toggle > i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
    background:#fff;border:1px solid var(--line);transition:left .12s}
  .toggle.on{background:var(--accent);border-color:var(--accent)}
  .toggle.on > i{left:20px;border-color:var(--accent)}

  /* voice preview */
  .play{width:44px;height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;
    color:var(--accent);flex:0 0 auto}
  .play.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .eq{display:inline-flex;gap:2px;align-items:center;height:14px}
  .eq i{width:3px;height:6px;background:currentColor;border-radius:1px;
    animation:eq .7s infinite ease-in-out}
  .eq i:nth-child(2){animation-delay:.15s}
  .eq i:nth-child(3){animation-delay:.3s}
  @keyframes eq{0%,100%{height:5px}50%{height:14px}}

  /* banner / push */
  .push{position:absolute;top:56px;left:12px;right:12px;background:#fff;
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;z-index:20;
    display:flex;gap:10px;align-items:center;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.15)}
  .push .app{width:26px;height:26px;border-radius:7px;background:var(--box);
    color:var(--ink);display:flex;align-items:center;justify-content:center;
    font-size:14px;flex:0 0 auto;border:1px solid var(--line)}

  /* overlay / tour */
  .overlay{position:absolute;inset:0;background:rgba(20,20,20,.62);z-index:30;
    display:flex;align-items:flex-end;padding:18px}
  .tourcard{background:#fff;border-radius:16px;padding:18px;width:100%}
  .divider{height:1px;background:var(--line2);margin:2px 0}
  .tag{font-size:11px;background:var(--box);border-radius:6px;padding:2px 7px;color:var(--mut)}

  /* collapsed "done" tasks group (dashboard) */
  .donerow{display:flex;gap:12px;align-items:center;padding:9px 4px;cursor:pointer;
    border-top:1px solid var(--line2);color:var(--mut)}
  .donerow .check{width:20px;height:20px;font-size:12px}
  .donerow .chev{font-size:11px;color:var(--mut)}
  .donecompact{padding:8px 4px}
  .donecompact .check{width:20px;height:20px;font-size:12px}

  /* full-screen camera (add-plant photo step) */
  .camwrap{flex:1 1 auto;display:flex;flex-direction:column;background:#333;
    overflow:hidden;position:relative}
  .camtop{display:flex;align-items:center;gap:10px;padding:12px 14px;color:#eee}
  .camtop .camhint{font-size:12px;color:#cfcfcf}
  .camx{background:rgba(255,255,255,.14);border:1px solid #555;color:#fff;border-radius:8px;
    padding:6px 10px;font-size:13px;cursor:pointer}
  .camx:active{background:rgba(255,255,255,.28)}
  .camguide{flex:1;margin:6px 22px;border:2px dashed rgba(255,255,255,.5);border-radius:14px;
    display:flex;align-items:center;justify-content:center;color:#cfcfcf;font-size:12px;
    letter-spacing:.08em;font-weight:700;text-align:center;
    background:repeating-linear-gradient(45deg,#3a3a3a,#3a3a3a 10px,#333 10px,#333 20px)}
  .camctrls{display:flex;align-items:center;justify-content:space-between;padding:16px 26px 22px}
  .shutter{width:66px;height:66px;border-radius:50%;background:#fff;border:4px solid #bbb;
    cursor:pointer;padding:0}
  .shutter:active{transform:scale(.94)}
  .galthumb{width:44px;height:44px;border-radius:9px;border:1px solid #666;color:#ddd;
    background:repeating-linear-gradient(45deg,#4a4a4a,#4a4a4a 6px,#3f3f3f 6px,#3f3f3f 12px);
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
  .camspacer{width:44px;flex:0 0 auto}

  /* species reference image carousel (species-info screen)
     NOTE: an explicit min-height on the flex row is required — without it the
     row collapses to zero height under scroll-snap (same Safari flex-child bug
     as the plant pager), leaving only the dot indicators visible. */
  .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
    margin:0 -16px;padding:0 16px;gap:10px;min-height:180px;
    -webkit-overflow-scrolling:touch}
  .carousel::-webkit-scrollbar{height:0;display:none}
  .cslide{flex:0 0 358px;width:358px;max-width:calc(100vw - 40px);scroll-snap-align:center;
    height:180px;min-height:180px}

  /* pinned bottom action footer (species-info / long screens) — sits inside the
     scroll container, sticks to the bottom, and stays visible without scrolling */
  .footer{position:sticky;bottom:0;margin:auto -16px 0;padding:12px 16px 6px;
    background:var(--bg);border-top:1px solid var(--line2);
    display:flex;flex-direction:column;gap:10px;z-index:5}

  /* inline SVG moisture chart (diagnosis screen) */
  .chart{display:block;width:100%;height:auto}

  /* ── PROTOTYPE SHELL: flow index / shortcuts panel (dev/review tool, not app UI)
     A flat list of flow entry points — no heading, no group labels. */
  .flowindex{position:fixed;top:24px;right:20px;width:180px;
    max-height:calc(100vh - 48px);overflow-y:auto;background:#f4f4f4;
    border:1px solid var(--line2);border-radius:12px;padding:8px;
    font-size:12px;color:var(--mut)}
  .fi-link{padding:6px 8px;border-radius:6px;cursor:pointer;color:var(--mut);line-height:1.3}
  .fi-link:hover{background:#eaeaea}
  .fi-link.on{color:var(--accent);font-weight:700;background:#e7efe9}
  @media (max-width:1100px){ .flowindex{display:none} }
</style>
</head>
<body>
<div id="root"></div>

<!-- App source: type="text/plain" so Babel does NOT auto-process it.
     The bootstrap at the bottom transforms it with the CLASSIC runtime
     (React.createElement) so no `import` statements are ever emitted. -->
<script type="text/plain" id="app-src">
const { useState, useMemo, useEffect, createContext, useContext } = React;

/* ───────────────── MOCK DATA ───────────────── */

  {

function Face({emotion, big, accent}){
  const e = EMO[emotion] || EMO.neutral;
  return <div className={"face"+(big?" big":"")+(accent?" accent":"")}>{e.face}</div>;

// Photo placeholder — the avatar. Emotion (if any) rides along as a corner badge.
function Photo({label="PHOTO", w, h=90, round, badge, style}){
  const e = badge && (EMO[badge] || EMO.neutral);
  return <div className={"ph"+(round?" round":"")}
    style={Object.assign({height:h, width:w, position:"relative", flex:w?"0 0 auto":undefined}, style||{})}>
    [{label}]

}

function StatusPill({emotion}){

  return <span className={"pill"+(e.tone==="ok"?" accent":"")}>

function TaskList(){
  const nav = useNav();
  const { tasks, toggleTask } = useApp();
  const [open,setOpen] = useState(false);
  // active tasks stay expanded; completed ones collapse into a compact group
  const active = tasks.filter(t=>!t.done);
  const done   = tasks.filter(t=>t.done);
  return <div className="list">
    {active.map(t=>{
      const p = plantById(t.plant);
      return <div className="li taskrow" key={t.id}>
        <div className="check" onClick={()=>{
          toggleTask(t.id); nav.go("reaction",{plant:t.plant,task:t.text});
        }}></div>
        <div className="grow">
          <div>{t.text}</div>
          <small className="muted">{p.name}</small>
        </div>
      </div>;
    })}
    {active.length===0 && done.length===0 &&
      <div className="li"><small className="muted">All caught up — nothing to do right now 🌿</small></div>}

    {done.length>0 && <>
      <div className="donerow" onClick={()=>setOpen(o=>!o)}>
        <span className="check done">✓</span>
        <div className="grow"><small>{done.length} done</small></div>
        <span className="chev">{open?"Hide ▲":"Show ▼"}</span>
      </div>
      {open && done.map(t=>{
        const p = plantById(t.plant);
        return <div className="li taskrow isdone donecompact" key={t.id}>
          <div className="check done" onClick={()=>toggleTask(t.id)}>✓</div>
          <div className="grow"><span className="done-txt">{t.text}</span>
            <small className="muted"> · {p.name}</small></div>
        </div>;
      })}
    </>}
  </div>;
}

function GroupChat(){
  const nav = useNav();
  const { chatCross } = useApp();
  const [msgs,setMsgs] = useState(CHAT_INIT);
  const [text,setText] = useState("");
  const send = ()=>{
    if(!text.trim()) return;
    const next=[...msgs,{who:"me",text}];
    setText("");
    setMsgs(next);
    setTimeout(()=>{
      setMsgs(m=>[...m,{who:"margo",text:"love it when you message us 💚"}]);
    },1);
  };
  // the "plants talk to each other" behaviour is controlled from chat settings only
  const shown = chatCross ? msgs : msgs.filter(m=>m.who==="me"||m.who==="felix");
  return <div className="screen" style={{paddingBottom:12}}>
    <div className="spread">
      <div className="row" style={{gap:8}}>
        <button className="back" onClick={nav.back}>‹</button>
        <div><div className="kicker">Group chat</div><h1 style={{fontSize:20,margin:0}}>You &amp; your plants</h1></div>
      </div>
      <button className="back" onClick={()=>nav.go("chatSettings")}>⚙</button>
    </div>
    <div className="col" style={{flex:1,gap:0,marginTop:4}}>
      {shown.map((m,i)=>{
        const isMe = m.who==="me";
        const p = !isMe && plantById(m.who);
        return <div key={i} className={"msg"+(isMe?" me":"")}>
          {!isMe && <div className="who">{p?p.name:m.who}</div>}

function speciesInfo(species){
  const shots = [1,2,3,4].map(n=> species+" · REF "+n);

  const confused = SPECIES.filter(s=>s!==species).slice(0,3)

/* Inline low-fi SVG line chart — soil moisture over 3 days, climbing into the
   "too wet" zone. Grey grid/axis, a single accent line, no fills/gradients/shadows. */
function MoistureChart(){
  const data = [38,44,49,58,66,74,85,92]; // % soil moisture, last reading = overwatered
  const W=320, H=112, pl=8, pr=8, pt=10, pb=20;
  const iw=W-pl-pr, ih=H-pt-pb, maxV=100;
  const xs = i => pl + (i/(data.length-1))*iw;
  const ys = v => pt + (1 - v/maxV)*ih;
  const pts = data.map((v,i)=>xs(i).toFixed(1)+","+ys(v).toFixed(1)).join(" ");
  const grid = [0,25,50,75,100];
  const dayX = [0,1,2].map(d=> pl + (d/2)*iw);
  return <svg className="chart" viewBox={"0 0 "+W+" "+H} role="img" aria-label="Soil moisture over the last 3 days">
    {grid.map(g=>(
      <line key={g} x1={pl} x2={W-pr} y1={ys(g)} y2={ys(g)} stroke="var(--line2)" strokeWidth="1"/>
    ))}
    {/* axes */}
    <line x1={pl} y1={pt} x2={pl} y2={H-pb} stroke="var(--line)" strokeWidth="1"/>
    <line x1={pl} y1={H-pb} x2={W-pr} y2={H-pb} stroke="var(--line)" strokeWidth="1"/>
    {/* the moisture line — single accent stroke, no fill */}
    <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2"
      strokeLinejoin="round" strokeLinecap="round"/>
    {/* day labels */}
    {["Day 1","Day 2","Day 3"].map((d,i)=>(
      <text key={d} x={dayX[i]} y={H-6} fontSize="9" fill="var(--mut)"
        textAnchor={i===0?"start":i===2?"end":"middle"}>{d}</text>
    ))}
  </svg>;
}

const SCREENS = {
  dashboard:Dashboard, reaction:Reaction, notifs:Notifications, profile:Profile,
  plantsList:PlantsList,
  plant:PlantDetail, waterConfig:WaterConfig, growth:Growth, plantSettings:PlantSettings,
  chat:GroupChat, chatSettings:ChatSettings, telegram:Telegram, language:Language,
  alert:Alert, diagnosis:Diagnosis, alertDone:AlertDone,
  pair:PairDevice, photoIntro:PhotoIntro, capture:CapturePhoto, species:SpeciesList,
  speciesDetail:SpeciesDetail, create:CreateCharacter, meeting:FirstMeeting,
};

/* Flow index — prototype-shell shortcut panel. Groups every screen by flow and
   jumps the prototype straight there. Lives OUTSIDE the device (dev/review tool). */
/* Flat list — one entry per flow, each jumps to that flow's ENTRY screen. */
const FLOWS = [
  ["Add new plant",     "pair"],
  ["Dashboard",         "dashboard"],
  ["Group chat",        "chat"],
  ["Notifications",     "notifs"],
  ["Plant card",        "plant", {id:"felix"}],
  ["Alert simulation",  "alert"],
];
function FlowIndex({cur}){
  const nav = useNav();
  return <aside className="flowindex">
    {FLOWS.map(([label,screen,params])=>(
      <div key={label}
        className={"fi-link"+(cur.screen===screen?" on":"")}
        onClick={()=>nav.go(screen,params||{})}>{label}</div>
    ))}
  </aside>;
}

function App(){
  const [stack,setStack] = useState([{screen:"dashboard",params:{}}]);
  const [tasks,setTasks] = useState(TASKS_INIT);
  const [chatCross,setChatCross] = useState(true);
  // the welcome tour must show only once per session, not on every return home
  const [tourSeen,setTourSeen] = useState(false);

  const cur = stack[stack.length-1];
  const nav = useMemo(()=>({
    go:(screen,params={})=> setStack(s=> screen==="dashboard"
      ? [{screen:"dashboard",params}]         // dashboard is the root — reset the stack
      : [...s,{screen,params}]),
    back:()=>setStack(s=>s.length>1?s.slice(0,-1):s),
  }),[]);
  const toggleTask = (id)=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));

  const Screen = SCREENS[cur.screen] || Dashboard;

  return (
    <AppCtx.Provider value={{tasks,toggleTask,chatCross,setChatCross,tourSeen,setTourSeen}}>
    <Nav.Provider value={nav}>
      <div className="phone">
        <div className="device">
          <div className="island"/>
          <StatusBar/>
          <Screen params={cur.params} key={cur.screen+stack.length}/>
        </div>
      </div>
      <FlowIndex cur={cur}/>
    </Nav.Provider>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- Bootstrap: manual Babel transform, classic runtime, no ES modules -->
<script>
(function () {
  function fail(msg) {
    document.getElementById("root").innerHTML =
      '<div style="max-width:360px;margin:80px auto;font-family:\'Urbanist\',sans-serif;color:#333;text-align:center">'
      + '<h2>Could not start the prototype</h2><p style="color:#777">' + msg + '</p></div>';
  }
  if (!window.React || !window.ReactDOM || !window.Babel) {
    return fail("React / Babel failed to load from the CDN. An internet connection is needed the first time you open this file.");
  }
  try {
    var src = document.getElementById("app-src").textContent;
    // classic runtime => React.createElement, never `import {jsx} from 'react/jsx-runtime'`
    var out = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    (0, eval)(out); // indirect eval => run in global scope
  } catch (e) {
    fail(String(e && e.message || e));
    throw e;
  }
})();
</script>
</body>
